<form id="loginForm">

    <label>Email</label>

    <input
        type="email"
        id="email"
        placeholder="Enter your registered email"
        required>

    <button type="submit">
        Login
    </button>

    <p class="register-link">
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

</form>
