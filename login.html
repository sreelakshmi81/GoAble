<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | GoAble</title>

<link rel="stylesheet" href="css/login.css">

</head>


<body>


<div class="login-container">


<div class="login-box">


<h1>Welcome Back</h1>

<p>
Login to access accessible locations and volunteer assistance.
</p>



<form id="loginForm">


<label>Email</label>

<input 
type="email"
id="email"
placeholder="Enter your email"
required>



<label>Password</label>

<input 
type="password"
id="password"
placeholder="Enter your password"
required>



<button type="submit">
Login
</button>



<p class="register-link">

Don't have an account?

<a href="register.html">
Register
</a>

</p>



</form>



</div>


</div>



<script src="js/login.js"></script>


</body>

</html>
