<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | GoAble</title>

    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

<header>

    <h1>My Profile</h1>

</header>

<main class="profile-container">

    <div class="profile-card">

        <h2 id="userName">User Name</h2>

        <hr>

        <p><strong>Email:</strong>
            <span id="userEmail"></span>
        </p>

        <p><strong>Age:</strong>
            <span id="userAge"></span>
        </p>

        <p><strong>Gender:</strong>
            <span id="userGender"></span>
        </p>

        <p><strong>City:</strong>
            <span id="userCity"></span>
        </p>

        <p><strong>Disabilities:</strong>
            <span id="userDisability"></span>
        </p>

        <p><strong>Medical Condition:</strong>
            <span id="medicalCondition"></span>
        </p>

        <p><strong>Equipment Used:</strong>
            <span id="equipmentUsed"></span>
        </p>

        <div class="buttons">

            <button onclick="location.href='dashboard.html'">
                Back to Dashboard
            </button>

            <button onclick="location.href='register.html'">
                Edit Profile
            </button>

        </div>

    </div>

</main>

<script src="js/profile.js"></script>

</body>
</html>
