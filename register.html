<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | GoAble</title>

    <link rel="stylesheet" href="css/register.css">

</head>


<body>


<div class="container">


    <div class="form-box">

        <h1>Create Account</h1>

        <p>
            Register to find accessible places and suitable assistance.
        </p>


        <form id="registerForm">


            <label>Name</label>
            <input 
            type="text" 
            id="name"
            placeholder="Enter your name"
            required>


            <label>Email</label>
            <input 
            type="email"
            id="email"
            placeholder="Enter your email"
            required>


            <label>Age</label>
            <input 
            type="number"
            id="age"
            required>


            <label>Gender</label>

            <select id="gender">

                <option>Male</option>
                <option>Female</option>
                <option>Other</option>

            </select>


            <label>Phone Number</label>

            <input 
            type="tel"
            id="phone"
            placeholder="Enter phone number">


            <label>Select Disability</label>


            <div class="checkbox">

                <label>
                <input 
                type="checkbox"
                value="Mobility Disability"
                class="disability">
                Mobility Disability
                </label>


                <label>
                <input 
                type="checkbox"
                value="Visual Disability"
                class="disability">
                Visual Disability
                </label>


                <label>
                <input 
                type="checkbox"
                value="Hearing Disability"
                class="disability">
                Hearing Disability
                </label>


                <label>
                <input 
                type="checkbox"
                value="Prosthetic User"
                class="disability">
                Prosthetic User
                </label>


            </div>


            <div id="dynamicQuestions"></div>



            <button type="submit">
                Create Account
            </button>


        </form>


    </div>


</div>



<script src="js/register.js"></script>

</body>

</html>
