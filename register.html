<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | GoAble</title>

<link rel="stylesheet" href="css/register.css">

</head>


<body>


<div class="container">


<div class="register-box">


<h1>Create Your Account</h1>

<p>
Tell us about yourself to get personalized accessibility recommendations.
</p>



<form id="registerForm">


<label>Name</label>

<input 
type="text" 
id="name"
placeholder="Enter your name"
required>



<label>Email</label>

<input 
type="email"
id="email"
placeholder="Enter your email"
required>



<label>Age</label>

<input 
type="number"
id="age"
placeholder="Enter your age"
required>



<label>Gender</label>

<select id="gender">

<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>




<label>Phone Number</label>

<input 
type="tel"
id="phone"
placeholder="Enter phone number">





<h3>Select Disability</h3>


<div class="disability-options">


<label>

<input 
type="checkbox"
class="disability"
value="Mobility Disability">

Mobility Disability

</label>



<label>

<input 
type="checkbox"
class="disability"
value="Hearing Disability">

Hearing Disability

</label>




<label>

<input 
type="checkbox"
class="disability"
value="Speech Disability">

Speech Disability

</label>


</div>



<div id="dynamicQuestions">

</div>



<button type="submit">

Create Account

</button>



</form>


</div>


</div>



<script src="js/register.js"></script>


</body>

</html>
