<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Volunteer Assistance | GoAble</title>

    <link rel="stylesheet" href="css/request.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Need Volunteer Assistance?</h1>

        <p>

            Based on your accessibility score, we can connect you with trained volunteers near your selected location.

        </p>

        <div class="details">

            <h3>Your Selection</h3>

            <p><strong>City :</strong> <span id="city"></span></p>

            <p><strong>Place :</strong> <span id="place"></span></p>

            <p><strong>Disability :</strong> <span id="disability"></span></p>

        </div>

        <div class="buttons">

            <button id="yesBtn">

                Find Volunteers

            </button>

            <button id="noBtn">

                Back to Dashboard

            </button>

        </div>

    </div>

</div>

<script src="js/request.js"></script>

</body>

</html>
