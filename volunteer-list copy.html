<body>

<header>

    <div class="logo">
        <h2>GoAble</h2>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="places.html">Places</a>

<section class="container">

    <h1>Recommended Volunteers</h1>

    <p>
        Based on your selected city, place and disability,
        these trained volunteers are available to assist you.
    </p>

    <div class="selection">

        <p>
            <strong>City:</strong>
            <span id="city"></span>
        </p>

        <p>
            <strong>Place:</strong>
            <span id="place"></span>
        </p>

        <p>
            <strong>Disability:</strong>
            <span id="disability"></span>
        </p>

    </div>

    <div id="volunteerContainer" class="volunteer-grid">

        <!-- Volunteer cards will appear here -->

    </div>

</section>

<script src="js/volunteers.js"></script>
