<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Volunteer Profile | GoAble</title>

    <link rel="stylesheet" href="css/volunteer.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">
        <h2>GoAble</h2>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="volunteer-list.html">Volunteers</a>
        <a href="profile.html">My Profile</a>
    </nav>

</header>

<div class="container">

    <div class="profile-card">

        <div class="profile-header">

            <div class="avatar" id="avatar">
                V
            </div>

            <h1 id="volunteerName">
                Volunteer Name
            </h1>

            <p id="specialization">
                Disability Specialist
            </p>

        </div>

        <div class="section">

            <h2>Volunteer Information</h2>

            <div class="info-grid">

                <div class="label">Gender</div>
                <div id="gender"></div>

                <div class="label">Age</div>
                <div id="age"></div>

                <div class="label">Experience</div>
                <div id="experience"></div>

                <div class="label">Languages</div>
                <div id="languages"></div>

                <div class="label">Phone Number</div>
                <div id="phone"></div>

                <div class="label">Availability</div>
                <div id="availability"></div>

                <div class="label">Rating</div>
                <div id="rating"></div>

            </div>

        </div>

        <div class="buttons">

    <button class="request-btn" onclick="requestVolunteer()">
        Request Volunteer
    </button>

    <a href="volunteer-list.html" class="btn primary">
        Back to Volunteers
    </a>

    <a href="dashboard.html" class="btn secondary">
        Dashboard
    </a>

</div>

    </div>

</div>

<script src="js/volunteer-profile.js"></script>

</body>

</html>
